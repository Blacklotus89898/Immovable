apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-observer
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-observer-readonly
rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - configmaps
    - namespaces
  verbs: ["get", "list"]

- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
    - statefulsets
    - daemonsets
  verbs: ["get", "list"]

- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-observer-readonly-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-observer-readonly
subjects:
- kind: ServiceAccount
  name: k8s-observer
  namespace: default
---
apiVersion: batch/v1
kind: Job
metadata:
  generateName: postsync-
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: k8s-observer
      restartPolicy: Never
      containers:
      - name: kubectl
        image: bitnami/kubectl:latest
        command:
        - sh
        - -c
        - |
          set -e

          echo "App: $ARGOCD_APP_NAME"
          echo "Namespace: $ARGOCD_APP_NAMESPACE"

          echo "===== LIVE RESOURCES ====="
          kubectl get all -n "$ARGOCD_APP_NAMESPACE" -o yaml